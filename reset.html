<!DOCTYPE html>
<html>
<head>
  <title>Reset</title>

  <script>
    const user = JSON.parse(localStorage.getItem("user") || "null");

    if (!user || user.id !== 1) {
      document.write("<h2>Access denied</h2>");
      window.location.href = "login.html";
    }
  </script>

</head>
<body>
  <h2>Reset Weekly Scores</h2>
  <button onclick="reset()">Reset</button>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzzaan_gI3KkmytUAPWvl59Ib3LkvbdrHuY4J-9a9BVPBTL619U5TqCWXuIQIPgVcBEbQ/exec";

    async function reset() {
      await fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({ action: "resetScores" })
      });

      alert("Reset complete");
    }
  </script>
</body>
</html>
