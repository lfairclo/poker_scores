<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      color: white;
    }

    .container {
      width: 900px;
      margin: 40px auto;
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      margin: 10px 0;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
    }

    .rank {
      font-size: 22px;
      width: 40px;
      text-align: center;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 180px;
    }

    .user img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }

    .scores {
      display: flex;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }

    .scoreBox {
      width: 30px;
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 5px;
      border-radius: 6px;
    }

    .total {
      width: 80px;
      text-align: right;
      font-weight: bold;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      opacity: 0.7;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Leaderboard</h1>

  <div class="header">
    <div>Rank</div>
    <div>User</div>
    <div>Scores (Last 10 Days)</div>
    <div>Total</div>
  </div>

  <div id="board"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzzaan_gI3KkmytUAPWvl59Ib3LkvbdrHuY4J-9a9BVPBTL619U5TqCWXuIQIPgVcBEbQ/exec";

async function load() {
  const res = await fetch(API_URL + "?action=getLeaderboard");
  const data = await res.json();

  // sort by total
  data.sort((a, b) => b.total - a.total);

  const board = document.getElementById("board");
  board.innerHTML = "";

  data.forEach((user, index) => {

    const row = document.createElement("div");
    row.className = "row";

    const scoresHTML = user.scores.map(s =>
      `<div class="scoreBox">${s}</div>`
    ).join("");

    row.innerHTML = `
      <div class="rank">#${index + 1}</div>

      <div class="user">
        <img src="${user.image || 'https://via.placeholder.com/40'}">
        <div>${user.name}</div>
      </div>

      <div class="scores">
        ${scoresHTML}
      </div>

      <div class="total">${user.total}</div>
    `;

    board.appendChild(row);
  });
}

load();
</script>

</body>
</html>
