<!DOCTYPE html>
<html>
<head>
  <title>Account</title>
</head>

<body>

<h2>Account Settings</h2>

<!-- NAME -->
<input id="name" placeholder="Name"><br><br>

<!-- PASSWORD -->
<input id="password" placeholder="New Password (leave blank to keep)"><br><br>

<!-- IMAGE URL -->
<input id="imageUrl" placeholder="Image URL"><br><br>

<!-- PREVIEW -->
<img id="preview" width="120"><br><br>

<button onclick="save()">Save</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzzaan_gI3KkmytUAPWvl59Ib3LkvbdrHuY4J-9a9BVPBTL619U5TqCWXuIQIPgVcBEbQ/exec";

const user = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");

document.getElementById("name").value = user.name || "";
document.getElementById("imageUrl").value = user.image || "";
document.getElementById("preview").src = user.image || "";

// live preview
document.getElementById("imageUrl").addEventListener("input", (e) => {
  document.getElementById("preview").src = e.target.value;
});

// -------------------
// SAVE ACCOUNT
// -------------------
async function save() {
  await fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "updateAccount",
      token: token,
      name: name.value,
      password: password.value,
      image: imageUrl.value
    })
  });

  alert("Saved");
}
</script>

</body>
</html>
