<!DOCTYPE html>
<html>
<head>
  <title>Account</title>
</head>

<body>

<h2>Account Settings</h2>

<!-- USER INFO -->
<input id="name" placeholder="Name"><br><br>
<input id="password" placeholder="New Password (leave blank to keep current)"><br><br>

<!-- IMAGE UPLOAD -->
<input type="file" id="fileInput"><br><br>

<progress id="progressBar" value="0" max="100"></progress><br><br>

<button onclick="save()">Save Changes</button>

<script>
const API_URL = "YOUR_SCRIPT_URL";
const user = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");

// preload name
document.getElementById("name").value = user.name || "";

// ---------------------------
// FILE UPLOAD (CORS SAFE)
// ---------------------------
async function uploadFile() {
  const file = fileInput.files[0];
  if (!file) return null;

  // validate type
  const allowed = ["image/png", "image/jpeg", "image/webp"];
  if (!allowed.includes(file.type)) {
    alert("Invalid file type");
    return null;
  }

  // validate size (2MB)
  if (file.size > 2 * 1024 * 1024) {
    alert("File too large (max 2MB)");
    return null;
  }

  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = async function () {

      const base64 = reader.result.split(",")[1];

      // fake progress animation (since fetch upload has no progress API in this setup)
      let progress = 0;
      const bar = document.getElementById("progressBar");

      const interval = setInterval(() => {
        progress += 8;
        bar.value = progress;
        if (progress >= 90) clearInterval(interval);
      }, 120);

      // SEND TO SERVER (NO RESPONSE READ → avoids CORS crash)
      await fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({
          action: "uploadImage",
          token: token,
          image: base64,
          mime: file.type,
          name: file.name
        })
      });

      bar.value = 100;

      // IMPORTANT:
      // We reconstruct expected URL pattern instead of reading response
      const extension = file.type.split("/")[1];
      const expectedUrl =
        "https://drive.google.com/uc?id=USER_" + user.id + "." + extension;

      resolve(expectedUrl);
    };

    reader.readAsDataURL(file);
  });
}

// ---------------------------
// SAVE ACCOUNT
// ---------------------------
async function save() {
  let imageUrl = null;

  // upload image if selected
  if (fileInput.files.length > 0) {
    imageUrl = await uploadFile();
  }

  await fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      action: "updateAccount",
      token: token,
      name: name.value,
      password: password.value,
      image: imageUrl
    })
  });

  alert("Account updated");
}
</script>

</body>
</html>
