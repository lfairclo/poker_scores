<!DOCTYPE html>
<html>
<body>
  <h2>Account</h2>

  <input id="name" placeholder="Name"><br>
  <input id="password" placeholder="New Password"><br>
  <input id="image" placeholder="Image URL"><br>

  <button onclick="save()">Save</button>

  <script>
    const API_URL = "https://script.google.com/a/macros/ucs.org.uk/s/AKfycbzzaan_gI3KkmytUAPWvl59Ib3LkvbdrHuY4J-9a9BVPBTL619U5TqCWXuIQIPgVcBEbQ/exec";
    const user = JSON.parse(localStorage.getItem("user"));

    document.getElementById("name").value = user.name;

    async function save() {
      await fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({
          action: "updateAccount",
          id: user.id,
          name: name.value,
          password: password.value,
          image: image.value
        })
      });

      alert("Updated");
    }
  </script>
</body>
</html>
